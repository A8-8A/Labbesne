server:
  port: ${PORT:8080}
spring:
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/labbesne}
    username: ${DATABASE_USER:postgres}
    password: ${DATABASE_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc.time_zone: UTC
app:
  jwt:
    secret: ${JWT_SECRET:change-me-in-prod-change-me-in-prod-change-me}
    expiration-ms: 604800000
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:5173}
